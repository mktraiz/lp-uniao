    <main class="page">
      <section class="hero">
        <div class="wrap hero-grid">
          <div>
            <div class="brandline">{{brandName}} / {{schoolName}}</div>
            <div class="eyebrow">Matriculas</div>
            <h1>{{title}}</h1>
            <p class="subtitle">{{subtitle}}</p>
            <div class="cta-row"><a class="button" href="#formulario">{{cta}}</a><a class="button button-secondary" href="#diferenciais">Comparar diferenciais</a></div>
          </div>
          <div class="visual-panel"><div class="visual-stat"><strong>{{statValue}}</strong>{{statLabel}}</div></div>
        </div>
      </section>
      <section id="diferenciais" class="section"><div class="wrap"><h2>Diferenciais que ajudam na escolha.</h2><div class="proof-grid">{{highlights}}</div></div></section>
      <section id="formulario" class="section section-muted"><div class="wrap two-col"><div><h2>Comece a conversa com matriculas.</h2><p class="subtitle">{{offer}}</p></div><div class="form-panel">{{hubspotForm}}</div></div></section>
    </main>
    <footer class="footer"><div class="wrap">{{schoolName}} - {{city}}/{{state}}</div></footer>
