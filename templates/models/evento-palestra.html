    <main class="page">
      <section class="hero">
        <div class="wrap hero-grid">
          <div><div class="brandline">{{brandName}} / {{schoolName}}</div><div class="eyebrow">Evento de captacao</div><h1>{{title}}</h1><p class="subtitle">{{subtitle}}</p><div class="cta-row"><a class="button" href="#formulario">{{cta}}</a><a class="button button-secondary" href="#programacao">Ver programacao</a></div></div>
          <div class="visual-panel"><div class="visual-stat"><strong>{{eventDate}}</strong>{{statLabel}}</div></div>
        </div>
      </section>
      <section id="programacao" class="section section-muted"><div class="wrap"><h2>Conteudo util para aproximar a familia da escola.</h2><div class="proof-grid">{{highlights}}</div></div></section>
      <section id="formulario" class="section"><div class="wrap two-col"><div><h2>Inscreva-se no evento.</h2><p class="subtitle">{{offer}}</p></div><div class="form-panel">{{formEmbed}}</div></div></section>
    </main>
    <footer class="footer"><div class="wrap">{{schoolName}} - {{city}}/{{state}}</div></footer>
