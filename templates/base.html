<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{title}} | {{schoolName}}</title>
    <meta name="description" content="{{subtitle}}">
    <style>
      :root {
        --primary: {{primaryColor}};
        --secondary: {{secondaryColor}};
        --ink: #17211f;
        --muted: #5f6f6b;
        --paper: #ffffff;
        --soft: #f4f7f5;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: var(--ink);
        background: var(--paper);
        font-family: Arial, Helvetica, sans-serif;
      }

      main {
        min-height: 100vh;
      }

      .hero {
        display: grid;
        min-height: 82vh;
        align-items: center;
        padding: 48px 20px;
        background:
          linear-gradient(110deg, rgba(15, 107, 95, 0.92), rgba(15, 107, 95, 0.72)),
          var(--primary);
        color: white;
      }

      .wrap {
        width: min(1120px, 100%);
        margin: 0 auto;
      }

      .brand {
        margin-bottom: 28px;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      h1 {
        max-width: 760px;
        margin: 0;
        font-size: clamp(40px, 8vw, 84px);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .subtitle {
        max-width: 620px;
        margin: 24px 0 0;
        font-size: 22px;
        line-height: 1.45;
      }

      .cta {
        display: inline-flex;
        min-height: 52px;
        align-items: center;
        justify-content: center;
        margin-top: 36px;
        padding: 0 22px;
        border-radius: 6px;
        background: var(--secondary);
        color: #18201d;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
      }

      .details {
        padding: 48px 20px 72px;
        background: var(--soft);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
      }

      .item {
        min-height: 130px;
        padding: 22px;
        border: 1px solid rgba(23, 33, 31, 0.12);
        border-radius: 8px;
        background: white;
        font-size: 18px;
        line-height: 1.35;
      }

      .footer {
        padding: 24px 20px;
        color: var(--muted);
        font-size: 14px;
      }

      @media (max-width: 760px) {
        .hero {
          min-height: 78vh;
        }

        h1 {
          font-size: 42px;
        }

        .subtitle {
          font-size: 19px;
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div class="wrap">
          <div class="brand">{{brandName}} / {{schoolName}}</div>
          <h1>{{title}}</h1>
          <p class="subtitle">{{subtitle}}</p>
          <a class="cta" href="{{ctaHref}}">{{cta}}</a>
        </div>
      </section>

      <section class="details">
        <div class="wrap">
          <div class="grid">
            {{highlights}}
          </div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="wrap">{{schoolName}} - {{city}}/{{state}}</div>
    </footer>
  </body>
</html>
